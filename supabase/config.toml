# Supabase Project Configuration
# https://supabase.com/docs/guides/cli/local-development

[api]
# Port to use for Supabase API
port = 54321
# Schemas to expose in auto API
schemas = ["public", "storage", "graphql_public"]
# Maximum number of rows returned from a single query
max_rows = 1000

[db]
# Port to use for PostgreSQL
port = 54322
# The database major version to use
major_version = 15

[studio]
# The origin that Supabase Studio is running on
api_url = "http://localhost:54321"
# Enable the pgAdmin PostgreSQL admin tool. Not recommended for production
enabled = true
# The port to use for pgAdmin
port = 5050

[inbucket]
# The port to use for the email testing server
port = 54324
# How to expose the inbucket service
enabled = true

[storage]
# The maximum file size allowed (in bytes)
file_size_limit = 52428800

[auth]
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://localhost:3000"
# A list of *exact* URLs that auth is permitted to redirect to post authentication.
additional_redirect_urls = ["https://localhost:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 seconds (one week).
jwt_expiry = 3600
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow testing manual OTP code
enable_manual_linking = false
